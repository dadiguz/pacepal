name: Pacepal
options:
  bundleIdPrefix: io.dallio
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: DY5QSGW9RM

targets:
  Pacepal:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PacePal
        excludes:
          - "**/*.md"
          - "**/*.entitlements"
      - path: songs
        type: folder
      - path: sounds
        type: folder
    dependencies:
      - sdk: HealthKit.framework
      - sdk: CoreLocation.framework
      - sdk: CoreMotion.framework
    entitlements:
      path: PacePal/PacePal.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.dallio.PacePal
        INFOPLIST_FILE: PacePal/Info.plist
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        CODE_SIGN_ENTITLEMENTS: PacePal/PacePal.entitlements
